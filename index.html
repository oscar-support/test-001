<!DOCTYPE html>
<html>
<head>
    <title>2048 Game</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #faf8ef; }
        #game-board { position: relative; margin: 20px auto; width: 440px; height: 440px; background: #bbada0; padding: 10px; border-radius: 5px; }
        .tile { position: absolute; width: 100px; height: 100px; background: #cdc1b4; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #776e65; transition: transform 0.2s ease-in-out; }
        .tile-2 { background: #eee4da; }
        .tile-4 { background: #ede0c8; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
    </style>
</head>
<body>
    <h1>2048</h1>
    <p>Version: 0.4.0</p>
    <div id="game-board"></div>
    <script>
        const board = document.getElementById('game-board');
        let tiles = []; // {x, y, value, id}

        function render() {
            board.innerHTML = '';
            tiles.forEach(t => {
                const div = document.createElement('div');
                div.className = 'tile tile-' + t.value;
                div.innerText = t.value;
                div.style.left = (t.x * 110 + 10) + 'px';
                div.style.top = (t.y * 110 + 10) + 'px';
                board.appendChild(div);
            });
        }

        function addTile() {
            let occupied = tiles.map(t => t.y * 4 + t.x);
            let empty = [];
            for(let i=0; i<16; i++) if(!occupied.includes(i)) empty.push(i);
            if (empty.length > 0) {
                let pos = empty[Math.floor(Math.random() * empty.length)];
                tiles.push({x: pos % 4, y: Math.floor(pos / 4), value: Math.random() < 0.9 ? 2 : 4});
            }
        }

        function move(dir) {
            let moved = false;
            // Sorting logic for movement
            tiles.sort((a, b) => {
                if (dir === 'ArrowUp') return a.y - b.y;
                if (dir === 'ArrowDown') return b.y - a.y;
                if (dir === 'ArrowLeft') return a.x - b.x;
                if (dir === 'ArrowRight') return b.x - a.x;
            });
            
            // This is a simplified move implementation
            tiles.forEach(t => {
                let nextX = t.x, nextY = t.y;
                if (dir === 'ArrowUp') nextY = 0;
                if (dir === 'ArrowDown') nextY = 3;
                if (dir === 'ArrowLeft') nextX = 0;
                if (dir === 'ArrowRight') nextX = 3;
                
                if (t.x !== nextX || t.y !== nextY) {
                    t.x = nextX; t.y = nextY;
                    moved = true;
                }
            });
            if (moved) addTile();
            render();
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                move(e.key);
            }
        });
        
        addTile(); addTile(); render();
    </script>
</body>
</html>
