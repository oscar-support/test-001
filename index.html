<!DOCTYPE html>
<html>
<head>
    <title>2048 Game</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #faf8ef; }
        #game-board { display: grid; grid-template-columns: repeat(4, 100px); gap: 10px; margin: 20px auto; width: 440px; background: #bbada0; padding: 10px; border-radius: 5px; }
        .cell { width: 100px; height: 100px; background: #cdc1b4; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #776e65; }
        .cell-2 { background: #eee4da; }
        .cell-4 { background: #ede0c8; }
        .cell-8 { background: #f2b179; color: #f9f6f2; }
        .cell-16 { background: #f59563; color: #f9f6f2; }
    </style>
</head>
<body>
    <h1>2048</h1>
    <p>Version: 0.2.1</p>
    <div id="game-board"></div>
    <script>
        const board = document.getElementById('game-board');
        let grid = Array(16).fill(0);

        function render() {
            board.innerHTML = '';
            grid.forEach(cell => {
                const div = document.createElement('div');
                div.className = 'cell' + (cell > 0 ? ' cell-' + cell : '');
                div.innerText = cell > 0 ? cell : '';
                board.appendChild(div);
            });
        }

        function addTile() {
            let empty = grid.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empty.length > 0) grid[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
        }

        function slide(row) {
            let arr = row.filter(v => v);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function move(dir) {
            let oldGrid = JSON.stringify(grid);
            let newGrid = [];
            
            for (let r = 0; r < 4; r++) {
                let row = [];
                for (let c = 0; c < 4; c++) row.push(grid[r * 4 + c]);
                if (dir === 'ArrowRight') row.reverse();
                if (dir === 'ArrowUp' || dir === 'ArrowDown') {
                    row = [];
                    for(let c = 0; c < 4; c++) row.push(grid[c * 4 + r]);
                    if (dir === 'ArrowDown') row.reverse();
                }
                
                let processed = slide(row);
                if (dir === 'ArrowRight') processed.reverse();
                
                if (dir === 'ArrowUp' || dir === 'ArrowDown') {
                    if (dir === 'ArrowDown') processed.reverse();
                    for(let c = 0; c < 4; c++) newGrid[c * 4 + r] = processed[c];
                } else {
                    for(let c = 0; c < 4; c++) newGrid[r * 4 + c] = processed[c];
                }
            }
            
            grid = newGrid;
            if (oldGrid !== JSON.stringify(grid)) addTile();
            render();
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) move(e.key);
        });
        
        addTile(); addTile(); render();
    </script>
</body>
</html>
