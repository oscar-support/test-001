<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2048 Pro Edition</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #faf8ef; }
        #game-board { width: 440px; height: 440px; background: #bbada0; border-radius: 6px; padding: 10px; margin: 20px auto; display: grid; grid-template-columns: repeat(4, 100px); gap: 10px; }
        .tile { width: 100px; height: 100px; background: #cdc1b4; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #776e65; }
        .val-2 { background: #eee4da; }
        .val-4 { background: #ede0c8; }
        .val-8 { background: #f2b179; color: #f9f6f2; }
        .val-16 { background: #f59563; color: #f9f6f2; }
        .val-32 { background: #f67c5f; color: #f9f6f2; }
    </style>
</head>
<body>
    <h1>2048 Pro</h1>
    <p>Version: 0.5.0</p>
    <div id="game-board"></div>
    <script>
        class Grid {
            constructor() { this.cells = Array(16).fill(0); }
            addTile() {
                let empty = this.cells.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
                if (empty.length > 0) this.cells[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
            }
            slide(row) {
                let arr = row.filter(v => v);
                for (let i = 0; i < arr.length - 1; i++) {
                    if (arr[i] === arr[i + 1]) { arr[i] *= 2; arr.splice(i + 1, 1); }
                }
                while (arr.length < 4) arr.push(0);
                return arr;
            }
            move(dir) {
                let old = JSON.stringify(this.cells);
                let newGrid = Array(16).fill(0);
                for (let r = 0; r < 4; r++) {
                    let row = [];
                    for (let c = 0; c < 4; c++) row.push(this.cells[r * 4 + c]);
                    if (['ArrowRight', 'ArrowDown'].includes(dir)) row.reverse();
                    if (['ArrowUp', 'ArrowDown'].includes(dir)) {
                        row = [];
                        for (let c = 0; c < 4; c++) row.push(this.cells[c * 4 + r]);
                        if (dir === 'ArrowDown') row.reverse();
                    }
                    let res = this.slide(row);
                    if (['ArrowRight', 'ArrowDown'].includes(dir)) res.reverse();
                    if (['ArrowUp', 'ArrowDown'].includes(dir)) {
                        for (let c = 0; c < 4; c++) newGrid[c * 4 + r] = res[c];
                    } else {
                        for (let c = 0; c < 4; c++) newGrid[r * 4 + c] = res[c];
                    }
                }
                this.cells = newGrid;
                if (old !== JSON.stringify(this.cells)) this.addTile();
            }
        }

        class Renderer {
            static render(grid) {
                const board = document.getElementById('game-board');
                board.innerHTML = '';
                grid.cells.forEach(val => {
                    const div = document.createElement('div');
                    div.className = 'tile' + (val > 0 ? ' val-' + val : '');
                    div.innerText = val > 0 ? val : '';
                    board.appendChild(div);
                });
            }
        }

        class Game {
            constructor() {
                this.grid = new Grid();
                this.grid.addTile(); this.grid.addTile();
                Renderer.render(this.grid);
                window.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        this.grid.move(e.key);
                        Renderer.render(this.grid);
                    }
                });
            }
        }
        new Game();
    </script>
</body>
</html>
